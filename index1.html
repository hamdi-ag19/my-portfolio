<form class="form" id="contact-form" action="https://formspree.io/f/mdallpeg" method="POST" novalidate>
    <div id="form-feedback" class="form-feedback"></div>
    <p class="title" id="form-title">Contact Me</p>
    <p class="message" id="form-msg">Fill the form below to get in touch with me.</p>
    
    <div class="flex">
        <label for="firstname">
            <input id="firstname" required name="firstname" placeholder="" type="text" class="input" autocomplete="given-name">
            <span id="label-fname">Firstname</span>
        </label>
        
        <label for="lastname">
            <input id="lastname" required name="lastname" placeholder="" type="text" class="input" autocomplete="family-name">
            <span id="label-lname">Lastname</span>
        </label>
    </div>  
            
    <label for="email">
        <input id="email" required name="email" placeholder="" type="email" class="input" autocomplete="email">
        <span id="label-email">Email</span>
    </label> 

    <label for="phone">
        <input id="phone" required name="phone" placeholder="" type="tel" class="input" autocomplete="tel">
        <span id="label-phone">Phone Number</span>
    </label>
        
    <label for="message">
        <textarea id="message" required name="message" class="input" style="height: 100px; padding-top: 15px;"></textarea>
        <span id="label-msg">Your Message</span>
    </label>

    <button type="submit" class="submit" id="submit-btn">Send Message</button>
    
</form>
